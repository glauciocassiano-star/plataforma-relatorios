<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem conexão</title>
  <meta name="theme-color" content="#1f8774">
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7f6;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      max-width: 520px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d9e2df;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      padding: 28px;
      text-align: center;
    }

    .icon {
      font-size: 42px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 24px;
      color: #1f8774;
    }

    p {
      margin: 0 0 12px 0;
      line-height: 1.6;
      color: #4b5563;
    }

    .btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 16px;
      border-radius: 10px;
      background: #1f8774;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }

    .btn:hover {
      background: #1d4c44;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Você está offline</h1>
    <p>
      Não foi possível carregar esta página agora.
    </p>
    <p>
      Se você já acessou partes do sistema antes, algumas telas ainda podem funcionar em cache.
      Os atendimentos salvos offline poderão ser sincronizados quando a conexão voltar.
    </p>
    <a class="btn" href="/">Tentar novamente</a>
  </div>
</body>
</html>
