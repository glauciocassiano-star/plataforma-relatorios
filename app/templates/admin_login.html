{% extends "base.html" %}

{% block title %}Login Administrativo{% endblock %}

{% block content %}

<div class="admin-login-shell">

  <div class="admin-login-card">

    <div class="admin-login-topo">
      <h2 class="admin-login-titulo">Acesso administrativo</h2>
      <p class="admin-login-subtitulo">
        Utilize suas credenciais para acessar o painel administrativo do sistema.
      </p>
    </div>

    <form method="POST" class="admin-login-form">

      <div class="admin-login-grupo">
        <label for="username">Usuário</label>
        <input
          class="campo-padrao"
          type="text"
          id="username"
          name="username"
          required
        >
      </div>

      <div class="admin-login-grupo">
        <label for="senha">Senha</label>
        <input
          class="campo-padrao"
          type="password"
          id="senha"
          name="senha"
          required
        >
      </div>

      <div class="admin-login-acoes">
        <button type="submit">Entrar</button>
      </div>

    </form>

  </div>

</div>

{% endblock %}
