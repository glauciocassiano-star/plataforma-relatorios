{% extends "base.html" %}

{% block title %}Editar Campo{% endblock %}

{% block content %}
<h2>Editar Campo</h2>

<form method="POST" style="display:grid;gap:12px;max-width:600px;">

  <div style="display:grid;gap:6px;">
    <label for="rotulo">Rótulo</label>
    <input
      type="text"
      id="rotulo"
      name="rotulo"
      value="{{ campo.rotulo }}"
      required
    >
  </div>

  <div style="display:grid;gap:6px;">
    <label for="nome_chave">Nome chave</label>
    <input
      type="text"
      id="nome_chave"
      name="nome_chave"
      value="{{ campo.nome_chave }}"
      required
    >
  </div>

  <div style="display:grid;gap:6px;">
    <label for="tipo">Tipo</label>
    <select name="tipo" id="tipo" required>
      <option value="text" {% if campo.tipo == "text" %}selected{% endif %}>Texto</option>
      <option value="textarea" {% if campo.tipo == "textarea" %}selected{% endif %}>Texto longo</option>
      <option value="number" {% if campo.tipo == "number" %}selected{% endif %}>Número</option>
      <option value="checkbox" {% if campo.tipo == "checkbox" %}selected{% endif %}>Checkbox</option>
      <option value="select" {% if campo.tipo == "select" %}selected{% endif %}>Seleção (select)</option>
      <option value="date" {% if campo.tipo == "date" %}selected{% endif %}>Data</option>
    </select>
  </div>

  <div style="display:grid;gap:6px;">
    <label for="ordem">Ordem</label>
    <input
      type="number"
      id="ordem"
      name="ordem"
      value="{{ campo.ordem }}"
    >
  </div>

  <div style="display:grid;gap:6px;">
    <label for="opcoes">Opções (para select)</label>
    <input
      type="text"
      id="opcoes"
      name="opcoes"
      value="{{ campo.opcoes | join(', ') if campo.opcoes else '' }}"
      placeholder='Ex: op1, op2, op3'
    >
  </div>

  <div class="checkbox-field">
  <input
    type="checkbox"
    name="obrigatorio"
    id="obrigatorio"
    {% if campo.obrigatorio %}checked{% endif %}
  >
  <label for="obrigatorio">Obrigatório</label>
</div>

  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button type="submit">Salvar alterações</button>
    <a class="btn btn-secondary" href="{{ url_for('main.admin_formulario_campos', formulario_id=formulario.id) }}">
      Cancelar
    </a>
  </div>

</form>

<p style="margin-top:14px;">
  <a href="{{ url_for('main.admin_formulario_campos', formulario_id=formulario.id) }}">← Voltar</a>
</p>

{% endblock %}
