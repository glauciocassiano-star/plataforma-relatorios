{% extends "base.html" %}

{% block title %}Novo Animal{% endblock %}

{% block content %}

<style>
  .animal-form-card {
    display: grid;
    gap: 14px;
    max-width: 1020px;
    width: 100%;
    margin: 0 auto;
    padding: 20px;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    box-sizing: border-box;
  }

  .campo-padrao {
    min-height: 56px;
    padding: 12px 14px;
    border: 1px solid #cfd8d5;
    border-radius: 10px;
    background: #ffffff;
    color: #1f2937;
    font-size: 16px;
    width: 100%;
    box-sizing: border-box;
    -webkit-appearance: none;
    appearance: none;
  }

  .campo-grupo {
    display: grid;
    gap: 6px;
  }

  .animal-form-acoes {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  input[type="date"].campo-padrao {
    display: block;
  }

  @media (max-width: 768px) {
    .animal-form-card {
      padding: 14px;
      max-width: 100%;
    }

    .animal-form-acoes {
      flex-direction: column;
      align-items: stretch;
    }

    .animal-form-acoes .btn,
    .animal-form-acoes button {
      width: 100%;
    }
  }
</style>

<h2 style="margin-bottom:18px;">Novo Animal - {{ propriedade.nome }}</h2>

<form
  method="POST"
  id="formAnimal"
  class="animal-form-card"
>
  <div class="campo-grupo">
    <label for="codigo"><b>Código do animal *</b></label>
    <input
      class="campo-padrao"
      type="text"
      name="codigo"
      id="codigo"
      placeholder="Ex: 00123"
      required
    />
  </div>

  <div class="campo-grupo">
    <label for="especie"><b>Espécie *</b></label>
    <select class="campo-padrao" name="especie" id="especie" required>
      <option value="bovino" selected>Bovino</option>
      <option value="equino">Equino</option>
      <option value="ovino">Ovino</option>
      <option value="caprino">Caprino</option>
      <option value="suino">Suíno</option>
      <option value="aves">Aves</option>
      <option value="outros">Outros</option>
    </select>
  </div>

  <div class="campo-grupo">
    <label for="data_nascimento">Data de nascimento</label>
    <input
      class="campo-padrao"
      type="date"
      name="data_nascimento"
      id="data_nascimento"
    />
  </div>

  <div class="campo-grupo">
    <label for="nome">Nome</label>
    <input
      class="campo-padrao"
      type="text"
      name="nome"
      id="nome"
      placeholder="Nome (opcional)"
    />
  </div>

  <div class="campo-grupo">
    <label for="raca">Raça</label>
    <input
      class="campo-padrao"
      type="text"
      name="raca"
      id="raca"
      placeholder="Raça (opcional)"
    />
  </div>

  <div class="campo-grupo">
    <label for="sexo">Sexo</label>
    <select class="campo-padrao" name="sexo" id="sexo">
      <option value="">Selecione (opcional)</option>
      <option value="M">Macho</option>
      <option value="F">Fêmea</option>
    </select>
  </div>

  <div class="campo-grupo">
    <label for="perfil_genetico">Perfil genético</label>
    <input
      class="campo-padrao"
      type="text"
      name="perfil_genetico"
      id="perfil_genetico"
      placeholder="Perfil genético (opcional)"
    />
  </div>

  <div class="animal-form-acoes">
    <button type="submit">Salvar</button>

    <button type="button" onclick="salvarOffline()" class="btn btn-secondary">
      💾 Salvar offline
    </button>
  </div>
</form>

<p style="margin-top:15px;">
  <a href="{{ url_for('main.listar_animais', propriedade_id=propriedade.id) }}">
    Voltar
  </a>
</p>

<script>
  function salvarOffline() {
    const form = document.getElementById("formAnimal");
    const formData = new FormData(form);
    const dados = {};

    formData.forEach((value, key) => {
      dados[key] = value;
    });

    dados._offline_id = crypto.randomUUID();
    dados._salvo_em = new Date().toISOString();
    dados._tipo = "animal";
    dados._propriedade_id = "{{ propriedade.id }}";

    let lista = JSON.parse(localStorage.getItem("animais_offline") || "[]");
    lista.push(dados);

    localStorage.setItem("animais_offline", JSON.stringify(lista));

    alert("Animal salvo offline com sucesso!");
  }
</script>

{% endblock %}
